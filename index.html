<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Protótipo</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icone.jpg?v=3">

    <style>
        /* Reset para garantir que nada empurre a imagem */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            /* Removi o height 100% que estava forçando a barra */
            background-color: #000;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            width: 100%;
            line-height: 0; /* Remove espaços fantasmas abaixo da imagem */
        }

        .app-img {
            width: 100%; /* Largura total do celular */
            height: auto; /* ALTURA PROPORCIONAL À IMAGEM ORIGINAL */
            display: block;
        }

        /* Esconde a barra lateral */
        ::-webkit-scrollbar {
            display: none;
        }

        img {
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="app-layout.jpg?v=3" alt="Interface" class="app-img">
    </div>

</body>
</html>
