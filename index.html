<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>App Preview</title>

    <!-- Configurações para virar "App" no iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icone.png">

    <!-- Configurações para virar "App" no Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" sizes="192x192" href="icone.png">

    <style>
        /* Reset básico para remover espaços e travar movimento lateral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            overflow-x: hidden;
            background-color: #000;
            /* Garante que o scroll seja suave no iOS */
            -webkit-overflow-scrolling: touch;
        }

        /* Container que segura a imagem */
        .app-wrapper {
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* A imagem ocupará a largura total e a altura será proporcional aos 3840px */
        .app-screen {
            width: 100%;
            height: auto;
            display: block;
            /* Evita borrões em imagens de alta resolução */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Esconde a barra de rolagem no Chrome, Safari e Edge */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Esconde a barra de rolagem no Firefox e IE */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Impede que o usuário selecione a imagem ou salve (ajuda no disfarce) */
        img {
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- Certifique-se de que o nome do arquivo abaixo seja igual ao da sua imagem -->
        <img src="app-layout.jpg" alt="Interface" class="app-screen">
    </div>

</body>
</html>
