<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>App Protótipo</title>

    <!-- Configurações de Web App para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Mudei para .jpg para garantir que o fundo amarelo apareça sólido -->
    <link rel="apple-touch-icon" href="icone.jpg?v=2">

    <style>
        /* Remove espaços indesejados e trava o zoom */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .app-img {
            width: 100%;
            height: auto;
            display: block;
            /* Garante que a imagem fique nítida */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Esconde a barra lateral de rolagem */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Bloqueia interação de salvar imagem para parecer app nativo */
        img {
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Nome da sua imagem de 3840px de altura -->
        <img src="app-layout.jpg?v=2" alt="App Screen" class="app-img">
    </div>

</body>
</html>
